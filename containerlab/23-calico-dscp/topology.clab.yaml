name: calico-dscp
topology:
  nodes:
    k01:
      kind: k8s-kind
      startup-config: k01-no-cni.yaml
      extras:
        k8s_kind:
          deploy:
            wait: 0s

    k01-control-plane:
      kind: ext-container
      exec:
        - "ip addr add dev eth1 10.10.10.10/24"
        - "sysctl -w net.ipv4.ip_forward=1"
        - "ip route add 10.30.30.0/24 via 10.10.10.1"
        - "ip route add default via 10.10.10.1"

    # Worker node - will run the DSCP-marked sender pod
    k01-worker:
      kind: ext-container
      exec:
        - "ip addr add dev eth1 10.10.10.11/24"
        - "sysctl -w net.ipv4.ip_forward=1"
        - "ip route add 10.30.30.0/24 via 10.10.10.1"
        - "ip route add default via 10.10.10.1"

    # Linux router - applies DSCP-based throttling using Linux tc
    # This router connects cluster nodes to the client and throttles DSCP-marked traffic
    router:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        # Bridge eth1 and eth2 to create a single L2 segment for cluster nodes
        - "ip link add name br-cluster type bridge"
        - "ip link set dev eth1 master br-cluster"
        - "ip link set dev eth2 master br-cluster"
        - "ip link set dev br-cluster up"
        - "ip link set dev eth1 up"
        - "ip link set dev eth2 up"
        # Add IP only on the bridge (not on individual interfaces)
        - "ip addr add dev br-cluster 10.10.10.1/24"
        # Interface facing client
        - "ip addr add dev eth3 10.30.30.1/24"
        # Enable IP forwarding
        - "sysctl -w net.ipv4.ip_forward=1"
        # Add route to pod network via cluster nodes
        - "ip route add 192.168.0.0/16 via 10.10.10.11"
        # Configure Linux tc to throttle based on DSCP on eth3 (egress to client)
        # AF11 (DSCP 10, TOS 0x28) -> 1 Mbps, EF (DSCP 46, TOS 0xb8) -> 5 Mbps
        - "tc qdisc add dev eth3 root handle 1: htb default 30"
        - "tc class add dev eth3 parent 1: classid 1:1 htb rate 1000mbit"
        - "tc class add dev eth3 parent 1:1 classid 1:10 htb rate 1mbit ceil 1mbit"
        - "tc class add dev eth3 parent 1:1 classid 1:20 htb rate 5mbit ceil 5mbit"
        - "tc class add dev eth3 parent 1:1 classid 1:30 htb rate 1000mbit"
        - "tc filter add dev eth3 protocol ip parent 1:0 prio 1 u32 match ip tos 0x28 0xff flowid 1:10"
        - "tc filter add dev eth3 protocol ip parent 1:0 prio 2 u32 match ip tos 0xb8 0xff flowid 1:20"

    # External client - receives traffic from the cluster
    # Traffic from pods with DSCP marking will be throttled by the Linux router
    client:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - "ip addr add dev eth1 10.30.30.100/24"
        - "ip route add 192.168.0.0/16 via 10.30.30.1"
        - "ip route add 10.10.10.0/24 via 10.30.30.1"
        - "ip route add default via 10.30.30.1"

  links:
    # Cluster nodes connected to router (separate interfaces)
    - endpoints: ["router:eth1", "k01-control-plane:eth1"]
    - endpoints: ["router:eth2", "k01-worker:eth1"]
    # Client connected to router
    - endpoints: ["router:eth3", "client:eth1"]
