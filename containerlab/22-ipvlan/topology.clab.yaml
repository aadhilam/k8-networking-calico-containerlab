name: ipvlan
topology:
  nodes:
    ceos01:
      kind: arista_ceos
      image: ceos:4.34.0F
      startup-config: startup-configs/ceos01-startup-config.config
    k01:
      kind: k8s-kind
      startup-config: k01-no-cni.yaml
      extras:
        k8s_kind:
          deploy:
            wait: 0s

    k01-control-plane:
      kind: ext-container
      exec:
        - "ip addr add dev eth1 10.10.10.10/24"
        - "ip link set dev eth1 up"
        # Configure eth2 for VLAN 30 (ipvlan direct)
        - "ip link set dev eth2 up"

    k01-worker:
      kind: ext-container
      exec:
        - "ip addr add dev eth1 10.10.10.11/24"
        - "ip link set dev eth1 up"
        # Configure eth2 for VLAN 30 (ipvlan direct)
        - "ip link set dev eth2 up"

    k01-worker2:
      kind: ext-container
      exec:
        - "ip addr add dev eth1 10.10.10.12/24"
        - "ip link set dev eth1 up"
        # Configure eth2 for VLAN 30 (ipvlan direct)
        - "ip link set dev eth2 up"

  links:
    # VLAN 10 links (for Calico pod networking)
    - endpoints: ["ceos01:eth1", "k01-control-plane:eth1"]
    - endpoints: ["ceos01:eth2", "k01-worker:eth1"]
    - endpoints: ["ceos01:eth3", "k01-worker2:eth1"]
    # VLAN 30 links (for ipvlan)
    - endpoints: ["ceos01:eth4", "k01-control-plane:eth2"]
    - endpoints: ["ceos01:eth5", "k01-worker:eth2"]
    - endpoints: ["ceos01:eth6", "k01-worker2:eth2"]
