apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan30-ipvlan-l3
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vlan30-ipvlan-l3",
      "type": "ipvlan",
      "master": "eth2",
      "mode": "l3",
      "ipam": {
        "type": "whereabouts",
        "range": "10.10.30.151-10.10.30.200/24",
        "exclude": [
          "10.10.30.1/32"
        ],
        "gateway": "10.10.30.1"
      }
    }
