---
apiVersion: v1
kind: Pod
metadata:
  name: netshoot-server
  labels:
    app: netshoot-server
spec:
  # Schedule on worker3 (VLAN 20) for cross-VLAN traffic demonstration
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - k01-worker3
  containers:
  - name: netshoot
    image: nicolaka/netshoot
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Netshoot Server pod started"
      echo "IP: $(hostname -i)"
      # Keep the pod running
      while true; do
        sleep 3600
      done

---
apiVersion: v1
kind: Service
metadata:
  name: netshoot-server
spec:
  selector:
    app: netshoot-server
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

