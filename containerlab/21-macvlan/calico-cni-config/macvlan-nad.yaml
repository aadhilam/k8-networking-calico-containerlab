apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan20-macvlan
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vlan20-macvlan",
      "type": "macvlan",
      "master": "eth2",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "10.10.20.100-10.10.20.200/24",
        "exclude": [
          "10.10.20.1/32"
        ],
        "gateway": "10.10.20.1"
      }
    }
