# App Version 2 (Canary) - ConfigMap, Deployment, and Service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-v2-html
  namespace: ingress-gateway-demo
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>App Version 2</title>
        <style>
            body { font-family: Arial, sans-serif; background: #5a2d27; color: white; 
                   display: flex; justify-content: center; align-items: center; 
                   height: 100vh; margin: 0; }
            .container { text-align: center; padding: 40px; 
                        background: rgba(255,255,255,0.1); border-radius: 10px; }
            h1 { font-size: 3em; margin-bottom: 20px; }
            p { font-size: 1.2em; opacity: 0.8; }
            .version { background: #d4a017; color: #333; padding: 10px 20px; 
                      border-radius: 20px; display: inline-block; font-weight: bold; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🧪 App Version 2</h1>
            <p class="version">CANARY RELEASE</p>
            <p>This is the canary version being tested.</p>
            <p>Served via Calico Ingress Gateway</p>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v2
  namespace: ingress-gateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-gateway-demo
      version: v2
  template:
    metadata:
      labels:
        app: ingress-gateway-demo
        version: v2
    spec:
      # Schedule on worker3/worker4 (nodes without bgp-peer label)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: bgp-peer
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sh", "-c", "httpd -f -p 80 -h /var/www/html"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /var/www/html
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: app-v2-html
---
apiVersion: v1
kind: Service
metadata:
  name: app-v2
  namespace: ingress-gateway-demo
spec:
  selector:
    app: ingress-gateway-demo
    version: v2
  ports:
    - port: 80
      targetPort: 80

